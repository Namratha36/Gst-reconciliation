version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: gst_user
      POSTGRES_PASSWORD: gst_password
      POSTGRES_DB: graphgst
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5.12.0
    environment:
      NEO4J_AUTH: neo4j/gst_password
    ports:
      - "7474:7474" # HTTP Browser
      - "7687:7687" # Bolt port
    volumes:
      - neo4jdata:/data

volumes:
  pgdata:
  neo4jdata:
